version: '3.8'

services:
  fhir:
    image: hapiproject/hapi:latest
    ports:
      -"8080:8080"
  mqtt:
    image: eclipse-mosquitto
    ports:  
      -"1883:1883"
  nodered:
    image: nodered/node-red
    ports:
      -"1880:1880"
  backend:
    build: ./backend
    ports:
      -"8000:8000"
  
  frontend:
    build: ./frontend
    ports:
      -"3000:3000"

